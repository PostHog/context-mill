name: PostHog Context Mill - Build
permissions:
  contents: read

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    outputs:
      examples: ${{ steps.set-examples.outputs.examples }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      with:
        node-version: lts/*

    - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      with:
        version: latest

    # TODO: Remove these two steps once @posthog/warlock is published to npm.
    # They exist because warlock is currently installed as a private git dependency,
    # so the CI runner needs credentials to clone it.
    - name: Generate token for private dependencies
      id: app-token
      uses: actions/create-github-app-token@v1
      with:
        app-id: ${{ secrets.GH_APP_POSTHOG_WIZARD_CI_BOT_APP_ID }}
        private-key: ${{ secrets.GH_APP_POSTHOG_WIZARD_CI_BOT_PRIVATE_KEY }}
        repositories: warlock

    - name: Configure git auth for private deps
      env:
        APP_TOKEN: ${{ steps.app-token.outputs.token }}
      run: git config --global url."https://x-access-token:${APP_TOKEN}@github.com/".insteadOf "https://github.com/"

    - name: Install dependencies
      run: pnpm install

    - name: Build
      run: pnpm build

    - name: Scan skills with Warlock
      run: node scripts/scan-warlock.js dist/skills

    - name: Lint env var naming conventions
      run: bash scripts/lint-env-naming.sh

      # No individual skill should be larger than 1MB, and the bundle should be less than 2MB.
      # No individual skill should be larger than 1MB, and the bundle should be less than 3MB.
    - name: Check bundle and skill sizes
      run: |
        set -e

        BUNDLE="dist/skills-mcp-resources.zip"
        if [ ! -f "$BUNDLE" ]; then
          echo "::error::Bundle $BUNDLE not found after build"
          exit 1
        fi

        # Get bundle size in bytes (supports both GNU and BSD stat)
        bundle_bytes=$(stat -c%s "$BUNDLE" 2>/dev/null || stat -f%z "$BUNDLE")
        echo "skills-mcp-resources.zip size: ${bundle_bytes} bytes"

        if [ "$bundle_bytes" -gt $((3 * 1024 * 1024)) ]; then
          echo "::error::skills-mcp-resources.zip is larger than 3MB (current: ${bundle_bytes} bytes)"
          exit 1
        fi

        # Check each individual skill ZIP under dist/skills/
        if [ -d "dist/skills" ]; then
          for file in dist/skills/*.zip; do
            [ -e "$file" ] || continue
            size_bytes=$(stat -c%s "$file" 2>/dev/null || stat -f%z "$file")
            echo "$(basename "$file") size: ${size_bytes} bytes"
            if [ "$size_bytes" -gt $((1 * 1024 * 1024)) ]; then
              echo "::error::Skill archive $file is larger than 1MB (current: ${size_bytes} bytes)"
              exit 1
            fi
          done
        else
          echo "::warning::dist/skills directory not found; skipping per-skill size checks"
        fi

    - name: Archive Artifacts
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: ${{ github.sha }}
        path: |
          ${{ github.workspace }}/*.tgz