# Skip Patterns Configuration
# Files and directories to exclude when processing example projects

# Global patterns applied to all examples
global:
  # Substring matching - skip if path contains any of these
  includes:
    # Data/config files
    - .json
    - .yaml
    - .yml
    - .tsbuildinfo
    - .lock

    # Images
    - .png
    - .jpg
    - .jpeg
    - .gif
    - .ico
    - .svg
    - .webp

    # Fonts
    - .woff
    - .woff2
    - .ttf
    - .eot

    # Archives/binaries
    - .pdf
    - .zip
    - .tar
    - .gz
    - .exe
    - .dll
    - .so
    - .dylib
    - .jar

    # Stylesheets
    - .css
    - .scss
    - .sass
    - .less
    - .styl
    - .stylus
    - .pcss
    - .postcss
    - .tailwindcss

    # Database
    - .sqlite
    - .sqlite-journal

    # Build artifacts and tooling
    - node_modules
    - .git
    - .next
    - dist
    - playwright-report
    - test-results
    - coverage
    - .DS_Store
    - .gitignore
    - eslint
    - repomix-output.xml
    - .gradle
    # Gradle wrapper
    - gradlew
    - gradlew.bat
    - gradle/wrapper
    # Test files
    - /test/
    - /androidTest/
    - Test.kt
    - Test.java
    - test.kt
    - test.java
    
    # React Native / Expo
    - .expo
    - .expo-shared
    - android/build
    - android/.gradle
    - android/.cxx
    - android/app/build
    - android/local.properties
    - ios/build
    - ios/Pods
    - ios/DerivedData
    - ios/*.xcworkspace
    - ios/*.xcodeproj/xcuserdata
    - .gradle
    - build
    - .metro-health-check
    - .watchmanconfig
    - .bundle

    # Python
    - venv
    - .venv
    - __pycache__
    - .pyc
    - .pyo
    - .pyd
    - .egg-info
    - .eggs
    - .pytest_cache
    - .mypy_cache
    - .ruff_cache
    - .tox
    - .nox
    - htmlcov
    - .coverage
    - pip-log.txt
    - .Python

    # Flask
    - instance
    - .db

    # Xcode / Swift
    - xcuserdata
    - DerivedData
    - .build
    - .swiftpm
    - .pbxproj

    # .NET
    - bin/
    - obj/

    # PHP General
    - vendor
    - .phpunit.result.cache
    - .php-cs-fixer.cache
    - .phpstan.cache
    - .php_cs.cache
    - phpstan.neon
    - psalm.xml
    - .psalm

    # Angular
    - .angular/

  # Regex patterns - skip if path matches
  # Note: Patterns are JavaScript regex syntax
  regex:
    # Skip .env files but allow .env.example
    - ^.env(?!\.example$)

# Example-specific overrides
# Add patterns here to skip files only for specific examples
# examples:
#   nextjs-app-router:
#     includes:
#       - some-specific-file.ts
#     regex:
#       - ^specific-pattern
#
# `allow` patterns (substring match) win over all skip patterns — use them to
# rescue a file a global pattern would exclude. An allow only rescues the path
# it matches: a file inside a skipped directory is never reached.

examples:
  swift-xcodegen:
    allow:
      # The XcodeGen project spec is the whole point of this example;
      # rescue it from the global .yml skip
      - project.yml
  laravel:
    includes:
      - storage/framework
      - storage/logs
      - bootstrap/cache
      - public/hot
      - public/storage
      - public/build
      - .env.backup

  android:
    includes:
      # Build artifacts
      - app/build
      - build
      # IDE and tooling
      - .idea
      - .gradle
      - .kotlin
      # Local configuration (gitignored)
      - local.properties
      # Generated files
      - .iml
      - proguard
      - lint-results
      - lint-results.html
      - lint-results_files
      - lint-results.xml
      - lint-temp
      - lint-output.txt
      - lint-cache
      - lintVitalRelease
      - lintVitalDebug
      - lint
      - generated
      - intermediates
      - outputs
      - tmp
      # Launcher icons (boilerplate, not relevant to PostHog integration)
      - ic_launcher
      - ic_launcher_background
      - ic_launcher_foreground
      - mipmap-anydpi-v26
      # Standard Android resource files (boilerplate)
      - backup_rules.xml
      - data_extraction_rules.xml
      - colors.xml
      - themes.xml
      # Gradle configuration files (not PostHog-specific)
      - gradle.properties
      - libs.versions.toml
      # XML files (Android resources and configs, not critical for PostHog understanding)
      - .xml
  
  # NOTE: for single-example skills the generator looks this section up by the
  # full skill id (see skill-generator.js), so the key is integration-flutter,
  # not flutter. Several older sections below (react-native, android, ...) still
  # use short keys and no longer match — kept as-is here; fixing them changes
  # their shipped EXAMPLE.md and deserves its own PR.
  integration-flutter:
    includes:
      # Flutter tooling metadata and local state
      - .metadata
      - .dart_tool
      - .flutter-plugins
      - .idea
      - .iml
      - local.properties
      # Tests
      - test/
      - RunnerTests
      # Generated/boilerplate platform scaffolding — kept in the repo so the
      # app runs on every platform, but noise as agent context. Unlike
      # react-native (which skips android/ and ios/ wholesale), the
      # PostHog-relevant platform files are kept: AndroidManifest.xml,
      # Info.plist, Podfile, entitlements, and web/index.html carry the
      # AUTO_INIT / minimum-version / web-snippet setup.
      - Runner.xcodeproj
      - Runner.xcworkspace
      - Assets.xcassets
      - .storyboard
      - .xib
      - .xcconfig
      - .swift
      - Runner-Bridging-Header.h
      - GeneratedPluginRegistrant
      - ephemeral
      - ios/Flutter
      - macos/Flutter
      - gradle.properties
      - android/app/src/main/kotlin
      - android/app/src/main/java
      - android/app/src/main/res
      - android/app/src/debug
      - android/app/src/profile
    allow:
      # The dependency manifest (posthog_flutter lives here); rescue it from
      # the global .yaml skip
      - pubspec.yaml
      # Carries the PostHog minSdk requirement; rescue from the global
      # build/.gradle skips
      - app/build.gradle

  react-native:
    includes:
      - android
      - ios
      - .bundle
      - Gemfile.lock
  
  expo:
    includes:
      - android
      - ios
      - .bundle
      - Gemfile.lock

  ruby-on-rails:
    includes:
      - tmp/
      - log/
      - storage/
      - public/assets
      - .ruby-version
      - .ruby-gemset
